# End-to-End Planner Configuration (UniAD-style)
# Reference: "Planning-oriented Autonomous Driving" (CVPR 2023 Best Paper)

data:
  dataroot: ./data/nuscenes
  version: v1.0-mini
  split: mini_train
  image_size: [224, 400]
  max_lidar_points: 34000
  future_steps: 6

backbone:
  name: resnet50
  pretrained: true
  out_channels: 256

bev:
  in_channels: 256
  bev_channels: 256
  bev_size: [200, 200]
  bev_range: [-50.0, -50.0, 50.0, 50.0]  # meters: [x_min, y_min, x_max, y_max]
  num_depth_bins: 64
  depth_min: 1.0
  depth_max: 60.0

# Detection head (DETR-style)
detection:
  num_queries: 300
  num_classes: 10  # car, truck, bus, trailer, construction_vehicle, pedestrian, motorcycle, bicycle, traffic_cone, barrier
  hidden_dim: 256
  num_heads: 8
  num_decoder_layers: 6
  ffn_dim: 512

# Motion forecasting head
motion:
  num_modes: 6
  future_steps: 6
  hidden_dim: 256

# Planning head
planning:
  future_steps: 6
  hidden_dim: 256
  num_heads: 8
  use_ego_status: true
  collision_weight: 5.0
  l2_weight: 1.0

training:
  batch_size: 1
  lr: 2.0e-4
  weight_decay: 0.01
  epochs: 24
  warmup_epochs: 3
